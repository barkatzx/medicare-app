name: medicare_app
description: "MediCare PLC is a premium, modern healthcare and pharmacy application designed for seamless medical shopping. It features a high-performance search engine, real-time inventory updates, and a secure checkout system. With a state-of-the-art UI, automated background notifications for order updates, and optimized performance for all mobile devices, MediCare provides a reliable and industry-standard experience for accessing essential healthcare products anytime, anywhere."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.2.2

  # Utilities
  intl: ^0.18.1

  # UI Components
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/MediCarePLC.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
